<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home AI Hub TV Dashboard</title>
    <link rel="stylesheet" href="/dashboard-static/styles.css" />
  </head>
  <body>
    <div class="tv-scene">
      <div class="shell">
        <header class="topbar">
          <div class="topbar-left">
            <div class="time-row"><span id="clock" class="time">10:15</span><span class="ampm">AM</span></div>
            <div id="date" class="date">Thursday, April 25</div>
          </div>
          <div class="topbar-right">
            <div id="sceneBadge" class="scene-pill">Morning Briefing</div>
            <div class="status-stack">
              <div class="status-row">
                <div id="weather" class="weather-pill">68F</div>
                <div id="tvStatus" class="status-pill status-pill-contrast">TV / dashboard</div>
                <div id="status" class="status-pill status-pill-online">ONLINE</div>
              </div>
              <div class="status-lower-row">
                <div id="wakeOverlay" class="wake-status hidden"></div>
                <section id="systemStrip" class="system-strip"></section>
              </div>
            </div>
          </div>
        </header>

        <section id="heroAlert" class="hero-banner hidden"></section>
        <section id="conversationPanel" class="conversation-panel">
          <div class="conversation-kicker">Conversation</div>
          <div id="conversationHeard" class="conversation-line">Waiting for voice input.</div>
          <div id="conversationReply" class="conversation-reply">Lumi replies will appear here.</div>
        </section>
        <section id="commandModePanel" class="command-mode-panel hidden">
          <div class="command-mode-kicker">Command Mode</div>
          <div id="commandModeTitle" class="command-mode-title">Lumi is ready</div>
          <div id="commandModeHeard" class="command-mode-heard">Waiting for a task to handle.</div>
          <div id="commandModeReply" class="command-mode-reply">Say a task and Lumi will process it.</div>
        </section>

        <main class="dashboard-grid">
          <section class="glass-panel schedule-panel">
            <div class="panel-header">
              <div class="panel-tabs">
                <button id="tabSchedule" class="tab-button active">Today's Schedule</button>
                <button id="tabDate" class="tab-button">By Date</button>
                <button id="tabTimeline" class="tab-button">By Person</button>
              </div>
            </div>
            <div id="scheduleView" class="panel-view"></div>
            <div id="dateView" class="panel-view hidden"></div>
            <div id="timelineView" class="panel-view hidden"></div>
          </section>

          <section class="glass-panel side-panel">
            <div class="panel-header compact-header">
              <div class="panel-tabs side-tabs">
                <button id="tabReminders" class="tab-button active">Reminders</button>
                <button id="tabInfo" class="tab-button">Updates</button>
              </div>
            </div>
            <div id="focusCard" class="focus-card"></div>
            <div id="reminderView" class="panel-view side-view"></div>
            <div id="infoView" class="panel-view side-view hidden"></div>
          </section>
        </main>

        <nav class="app-dock">
          <button class="dock-item active" data-dock="calendar">
            <span class="dock-glow"></span>
            <span class="dock-icon">CAL</span>
            <span class="dock-label">Calendar</span>
          </button>
          <button class="dock-item" data-dock="photos">
            <span class="dock-glow"></span>
            <span class="dock-icon">PHO</span>
            <span class="dock-label">Photos</span>
          </button>
          <button class="dock-item notification-item" data-dock="reminders">
            <span class="dock-glow"></span>
            <span class="dock-icon">ALT</span>
            <span class="dock-label">Reminders</span>
            <span id="dockNotificationCount" class="dock-badge hidden">0</span>
          </button>
          <button class="dock-item" data-dock="settings">
            <span class="dock-glow"></span>
            <span class="dock-icon">SYS</span>
            <span class="dock-label">Settings</span>
          </button>
        </nav>

        <footer class="assistant-bar">
          <div class="assistant-icon">MIC</div>
          <div class="assistant-copy">
            <div id="voiceStatus" class="assistant-title">How can I assist you?</div>
            <div id="footerUpdate" class="assistant-meta">System healthy</div>
          </div>
          <div id="footerSummary" class="assistant-summary">No reminders</div>
        </footer>
      </div>

      <div id="modal" class="modal hidden">
        <div class="modal-card">
          <div id="modalTitle" class="modal-title">Alert</div>
          <div id="modalMessage" class="modal-message"></div>
          <div id="modalMeta" class="modal-meta"></div>
          <button id="modalAck">Acknowledge</button>
        </div>
      </div>
    </div>

    <script src="/dashboard-static/fake-data.js"></script>
    <script src="/dashboard-static/app.js"></script>
  </body>
</html>
