<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home AI Hub TV Dashboard</title>
    <link rel="stylesheet" href="/dashboard-static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div id="clock" class="time">--:--</div>
          <div id="date" class="date">----</div>
        </div>
        <div class="topbar-right">
          <div id="weather" class="pill">Weather</div>
          <div id="tvStatus" class="pill">TV</div>
          <div id="status" class="pill status">ONLINE</div>
        </div>
      </header>

      <section id="heroAlert" class="hero-alert hidden"></section>

      <section id="systemStrip" class="system-strip"></section>

      <main class="grid">
        <section class="panel">
          <div class="panel-title">Today</div>
          <div id="scheduleList" class="schedule-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Family Timeline</div>
          <div id="timeline" class="timeline"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Alerts And Info</div>
          <div class="sub-title">Reminders</div>
          <div id="reminderList" class="card-list"></div>
          <div class="sub-title">Updates</div>
          <div id="infoList" class="card-list"></div>
        </section>
      </main>

      <footer class="footer">
        <div id="voiceStatus">Voice standby</div>
        <div id="footerSummary">No reminders</div>
        <div id="footerUpdate">System healthy</div>
      </footer>

      <div id="modal" class="modal hidden">
        <div class="modal-card">
          <div id="modalTitle" class="modal-title">Alert</div>
          <div id="modalMessage" class="modal-message"></div>
          <div id="modalMeta" class="modal-meta"></div>
          <button id="modalAck">Acknowledge</button>
        </div>
      </div>
    </div>

    <script src="/dashboard-static/app.js"></script>
  </body>
</html>
